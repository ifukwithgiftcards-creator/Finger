<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Infinite Word Cannon</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #050505;
    perspective: 1500px;
    font-family: Impact, Arial Black, sans-serif;
  }

  #stage {
    position: absolute;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
  }

  .word {
    position: absolute;
    left: 50%;
    top: 50%;
    transform-style: preserve-3d;
    font-size: clamp(2rem, 8vw, 6rem);
    font-weight: 900;
    color: #ff00ea;
    text-transform: uppercase;
    pointer-events: none;
    white-space: nowrap;
    text-shadow:
      0 0 10px #ff00ea,
      0 0 20px #ff00ea,
      0 0 40px #ff00ea,
      0 0 80px #ff00ea;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    opacity: 0;
    border-radius: 50%;
    pointer-events: none;
  }
</style>
</head>

<body>
<div id="stage"></div>

<script>
const stage = document.getElementById("stage");

// Phrase loop
const words = ["FUCK", "YOU", "VERY", "MUCH"];
let index = 0;

// Spawn words every ~600ms
setInterval(() => {
  spawnWord(words[index]);
  index = (index + 1) % words.length;
}, 600);

function spawnWord(text) {
  const el = document.createElement("div");
  el.className = "word";
  el.innerText = text;

  // Random trajectory
  const tx = (Math.random() - 0.5) * 2000;
  const ty = (Math.random() - 0.5) * 1200;
  const rot = (Math.random() - 0.5) * 720;

  stage.appendChild(el);

  // Start far away
  el.style.transform = `
    translate(-50%, -50%)
    translate3d(0, 0, -2500px)
    scale(0.2)
    rotate(0deg)
  `;

  // Force layout
  el.offsetHeight;

  // Animate forward
  el.style.transition = "transform 2.2s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 2.2s";
  el.style.transform = `
    translate(-50%, -50%)
    translate3d(${tx}px, ${ty}px, 1500px)
    scale(3)
    rotate(${rot}deg)
  `;
  el.style.opacity = 0;

  // Cleanup
  setTimeout(() => {
    el.remove();
  }, 2200);
}

// Starfield loop (~50ms)
setInterval(() => {
  spawnStar();
}, 50);

function spawnStar() {
  const star = document.createElement("div");
  star.className = "star";

  const x = Math.random() * window.innerWidth;
  const y = Math.random() * window.innerHeight;

  stage.appendChild(star);

  star.style.left = x + "px";
  star.style.top = y + "px";

  // Start deep
  star.style.transform = `translateZ(-2000px) scale(0.5)`;

  star.offsetHeight;

  // Animate forward
  star.style.transition = "transform 1.5s linear, opacity 1.5s";
  star.style.opacity = 1;
  star.style.transform = `translateZ(1000px) scale(2)`;

  setTimeout(() => {
    star.style.opacity = 0;
  }, 1200);

  setTimeout(() => {
    star.remove();
  }, 1500);
}
</script>

</body>
</html><script>
const stage = document.getElementById('stage');
const phrases = ["FUCK", "YOU", "VERY", "MUCH"];
let phraseIndex = 0;

function spawnWord() {
    const word = document.createElement('div');
    word.className = 'flying-word';
    word.textContent = phrases[phraseIndex];

    const tx = (Math.random() - 0.5) * 2000;
    const ty = (Math.random() - 0.5) * 1000;
    const rot = (Math.random() - 0.5) * 180;

    word.style.setProperty('--tx', `${tx}px`);
    word.style.setProperty('--ty', `${ty}px`);
    word.style.setProperty('--rot', `${rot}deg`);

    word.style.animation = 'central-burst 2.5s ease forwards';

    stage.appendChild(word);

    setTimeout(() => word.remove(), 2500);

    phraseIndex = (phraseIndex + 1) % phrases.length;
}

setInterval(spawnWord, 600);

/* Star field */
function createStar() {
    const star = document.createElement('div');
    star.className = 'bg-sparkle';

    const size = Math.random() * 3 + 1;
    star.style.width = `${size}px`;
    star.style.height = `${size}px`;
    star.style.left = `${Math.random() * 100}%`;
    star.style.top = `${Math.random() * 100}%`;

    document.body.appendChild(star);

    setTimeout(() => star.remove(), 3000);
}

setInterval(createStar, 50);
</script>

</body>
</html>
