<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Glitter Curveball — Fixed</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root {
    --glitter: radial-gradient(circle, #fff 1px, transparent 1px);
    --sparkle-color: #ff00ea;
}

body {
    background-color: #050505;
    margin: 0;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    perspective: 1500px;
    font-family: 'Arial Black', sans-serif;
}

/* CENTERED HAND */
.hand-anchor {
    position: absolute;
    width: 300px;
    height: 500px;
    z-index: 50;
    display: flex;
    justify-content: center;
    align-items: center;
    filter: drop-shadow(0 0 30px rgba(255, 0, 234, 0.5));
    pointer-events: none;
}

/* HAND SHAPE */
.glitter-hand {
    width: 100%;
    height: 100%;
    fill: #111;
    stroke: var(--sparkle-color);
    stroke-width: 2;
}

/* GLITTER MASK */
.glitter-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: var(--glitter), var(--glitter), var(--glitter);
    background-size: 30px 30px, 50px 50px, 20px 20px;
    mix-blend-mode: screen;

    mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M70 280 L70 160 Q70 140 85 140 L85 60 Q85 30 100 30 Q115 30 115 60 L115 140 L130 140 Q145 140 145 160 L145 280 Z M55 200 Q40 190 45 170 Q50 150 65 160 L65 200 Z M145 200 Q160 190 155 170 Q150 150 135 160 L135 200 Z'/%3E%3C/svg%3E");

    mask-size: contain;
    mask-repeat: no-repeat;
    mask-position: center;

    animation: shimmer 1.5s linear infinite;
}

@keyframes shimmer {
    from { background-position: 0 0, 0 0, 0 0; }
    to { background-position: 120px 120px, -60px 60px, 30px -90px; }
}

/* STAGE */
#stage {
    position: absolute;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* WORDS */
.flying-word {
    position: absolute;
    color: #fff;
    font-size: 4rem;
    font-weight: 900;
    text-transform: uppercase;
    opacity: 0;
    transform-style: preserve-3d;
    text-shadow:
        0 0 10px var(--sparkle-color),
        0 0 30px var(--sparkle-color);
}

@keyframes central-burst {
    0% {
        opacity: 0;
        transform: translate3d(0,0,-2500px) scale(0.1);
    }
    15% { opacity: 1; }
    100% {
        opacity: 0;
        transform: translate3d(var(--tx), var(--ty), 1500px)
                   rotate(var(--rot))
                   scale(5);
    }
}

/* STARS */
.bg-sparkle {
    position: absolute;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 10px var(--sparkle-color);
    animation: star-field 3s linear infinite;
}

@keyframes star-field {
    from { transform: translateZ(-2000px); opacity: 0; }
    to { transform: translateZ(1000px); opacity: 1; }
}
</style>

</head>

<body>

<div id="stage"></div>

<!-- CENTERED HAND -->

<div class="hand-anchor">
    <svg class="glitter-hand" viewBox="0 0 200 300">
        <!-- 5-finger silhouette -->
        <path d="
        M80 280
        L80 170
        Q80 150 95 150
        L95 60
        Q95 20 110 20
        Q125 20 125 60
        L125 150
        L140 150
        Q155 150 155 170
        L155 280
        Z

```
    M60 220 Q45 200 55 175 Q65 155 75 170 L75 220 Z
    M150 220 Q165 200 155 175 Q145 155 135 170 L135 220 Z
    " />
</svg>
<div class="glitter-overlay"></div>
```

</div>

<script>
const stage = document.getElementById('stage');
const phrases = ["FUCK", "YOU", "VERY", "MUCH"];
let phraseIndex = 0;

function spawnWord() {
    const word = document.createElement('div');
    word.className = 'flying-word';
    word.textContent = phrases[phraseIndex];

    const tx = (Math.random() - 0.5) * 2000;
    const ty = (Math.random() - 0.5) * 1000;
    const rot = (Math.random() - 0.5) * 180;

    word.style.setProperty('--tx', `${tx}px`);
    word.style.setProperty('--ty', `${ty}px`);
    word.style.setProperty('--rot', `${rot}deg`);

    word.style.animation = 'central-burst 2.5s ease forwards';

    stage.appendChild(word);
    setTimeout(() => word.remove(), 2500);

    phraseIndex = (phraseIndex + 1) % phrases.length;
}

setInterval(spawnWord, 600);

function createStar() {
    const star = document.createElement('div');
    star.className = 'bg-sparkle';

    const size = Math.random() * 3 + 1;
    star.style.width = `${size}px`;
    star.style.height = `${size}px`;
    star.style.left = `${Math.random() * 100}%`;
    star.style.top = `${Math.random() * 100}%`;

    document.body.appendChild(star);
    setTimeout(() => star.remove(), 3000);
}

setInterval(createStar, 50);
</script>

</body>
</html>
