<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Glitter Curveball</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --glitter: radial-gradient(circle, #fff 1px, transparent 1px);
            --sparkle-color: #ff00ea;
        }

        body {
            background-color: #050505;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1500px;
            font-family: 'Arial Black', sans-serif;
        }

        /* The Hand - Stationary but shimmering */
        .hand-anchor {
            position: absolute;
            bottom: -80px;
            width: 280px;
            height: 450px;
            z-index: 50;
            filter: drop-shadow(0 0 25px rgba(255, 0, 234, 0.4));
            pointer-events: none;
        }

        .glitter-hand {
            width: 100%;
            height: 100%;
            fill: #111;
            stroke: var(--sparkle-color);
            stroke-width: 1.5;
        }

        .glitter-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: var(--glitter), var(--glitter), var(--glitter);
            background-size: 35px 35px, 50px 50px, 20px 20px;
            mix-blend-mode: screen;
            mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M70,280 L70,150 L50,150 L50,120 Q50,100 70,100 L70,40 Q70,20 90,20 Q110,20 110,40 L110,100 Q130,100 130,120 L130,150 L150,150 L150,280 Z' /%3E%3C/svg%3E");
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
            animation: shimmer 1.5s linear infinite;
        }

        @keyframes shimmer {
            from { background-position: 0 0, 0 0, 0 0; }
            to { background-position: 100px 100px, -50px 50px, 20px -80px; }
        }

        /* Center Burst Logic */
        #stage {
            position: absolute;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flying-word {
            position: absolute;
            color: #fff;
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
            transform-style: preserve-3d;
            text-shadow: 
                0 0 10px var(--sparkle-color),
                0 0 30px var(--sparkle-color);
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* Infinite Looping Curveball */
        @keyframes central-burst {
            0% {
                opacity: 0;
                transform: translate3d(0, 0, -2500px) rotate(0deg) scale(0.1);
            }
            15% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate3d(var(--tx), var(--ty), 1500px) rotate(var(--rot)) scale(5);
            }
        }

        .bg-sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--sparkle-color);
            pointer-events: none;
            animation: star-field 3s linear infinite;
        }

        @keyframes star-field {
            from { transform: translateZ(-2000px); opacity: 0; }
            to { transform: translateZ(1000px); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="stage"></div>

    <div class="hand-anchor">
        <svg class="glitter-hand" viewBox="0 0 200 300">
            <path d="
                M 40,280 
                L 40,160 
                Q 40,140 60,140 
                L 70,140 
                L 70,40 
                Q 70,10 95,10 
                Q 120,10 120,40 
                L 120,140 
                L 130,140 
                Q 150,140 150,160 
                L 150,280 
                Z" />
        </svg>
        <div class="glitter-overlay"></div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const phrases = ["FUCK", "YOU", "VERY", "MUCH"];
        let phraseIndex = 0;

        function spawnWord() {
            const word = document.createElement('div');
            word.className = 'flying-word';
            word.textContent = phrases[phraseIndex];
            
            // Randomize "Curveball" trajectories
            const tx = (Math.random() - 0.5) * 2000; // Wide horizontal spread
            const ty = (Math.random() - 0.5) * 1000; // Vertical spread
            const rot = (Math.random() - 0.5) * 180; // Wild rotation
            
            word.style.setProperty('--tx', `${tx}px`);
            word.style.setProperty('--ty', `${ty}px`);
            word.style.setProperty('--rot', `${rot}deg`);
            
            // Set dynamic animation
            word.style.animation = 'central-burst 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards';
            
            stage.appendChild(word);
            
            // Cleanup and cycle
            setTimeout(() => word.remove(), 2500);
            phraseIndex = (phraseIndex + 1) % phrases.length;
        }

        // Generator loop
        setInterval(spawnWord, 600);

        // Background Atmosphere
        function createStar() {
            const star = document.createElement('div');
            star.className = 'bg-sparkle';
            const size = Math.random() * 3 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 3000);
        }

        setInterval(createStar, 50);
    </script>
</body>
</html>
